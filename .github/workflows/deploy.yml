name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Site layout: store at the root, planner + store-admin stubs under /admin
      - name: Assemble site
        run: |
          mkdir -p _site/admin
          cp -r store/. _site/
          cp -r admin/. _site/admin/
          cp -r planner _site/admin/planner
          rm -f _site/start.sh _site/fetch_products.sh _site/admin/planner/start.sh _site/admin/planner/gen_manifest.sh
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
