<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>ALO UKRAINE · Admin</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a1a1a'/%3E%3Ctext y='64' x='50' text-anchor='middle' font-size='34' font-family='serif' fill='white'%3EA%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- PIN gate (косметичний, не є безпекою — сторінка публічна) -->
  <div id="gate" class="gate hidden">
    <div class="gate-card">
      <div class="gate-logo">ALO UKRAINE</div>
      <div class="gate-sub">Адмін-панель · тестовий стенд</div>
      <input id="gateInput" type="password" placeholder="PIN" autocomplete="off" />
      <button id="gateBtn">Увійти</button>
      <div id="gateErr" class="gate-err"></div>
    </div>
  </div>

  <div id="shell" class="shell hidden">
    <aside class="sidebar">
      <div class="side-logo">ALO UKRAINE<span>admin</span></div>
      <nav id="nav">
        <a href="#/" data-route="/">Дашборд</a>
        <a href="#" id="plannerLink" class="external">Планер постів ↗</a>
        <a href="#/products" data-route="/products">Товари</a>
        <a href="#/orders" data-route="/orders">Замовлення</a>
        <a href="#/payments" data-route="/payments">Оплати</a>
        <a href="#/settings" data-route="/settings">Налаштування</a>
      </nav>
      <div class="side-foot">
        <a href="#" id="storeLink" class="side-store">← Відкрити сайт</a>
        <div>Тестовий стенд · без реальних даних</div>
      </div>
    </aside>
    <main id="main" class="main"></main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
